<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 160 160" width="160" height="160" shape-rendering="crispEdges">
  <title>pixel cat mascot, blinking and bobbing</title>
  <g id="cat">
    <animateTransform attributeName="transform" type="translate" values="0 0;0 -6;0 0;0 0" keyTimes="0;0.5;0.9;1" dur="2.4s" repeatCount="indefinite" calcMode="discrete" />

    <!-- row0: ear tips -->
    <rect x="20" y="0" width="20" height="20" fill="#2E2440" />
    <rect x="120" y="0" width="20" height="20" fill="#2E2440" />

    <!-- row1: ears -->
    <rect x="20" y="20" width="20" height="20" fill="#2E2440" />
    <rect x="40" y="20" width="20" height="20" fill="#2E2440" />
    <rect x="100" y="20" width="20" height="20" fill="#2E2440" />
    <rect x="120" y="20" width="20" height="20" fill="#2E2440" />

    <!-- row2: head top -->
    <rect x="0" y="40" width="20" height="20" fill="#2E2440" />
    <rect x="20" y="40" width="120" height="20" fill="#FFD9C7" />
    <rect x="140" y="40" width="20" height="20" fill="#2E2440" />

    <!-- row3: eyes -->
    <rect x="0" y="60" width="20" height="20" fill="#2E2440" />
    <rect x="20" y="60" width="20" height="20" fill="#FFD9C7" />
    <rect id="eyeL" x="40" y="60" width="20" height="20" fill="#2E2440">
      <animate attributeName="fill" values="#2E2440;#2E2440;#FFD9C7;#2E2440" keyTimes="0;0.88;0.94;1" dur="3.6s" repeatCount="indefinite" calcMode="discrete" />
    </rect>
    <rect x="60" y="60" width="40" height="20" fill="#FFD9C7" />
    <rect id="eyeR" x="100" y="60" width="20" height="20" fill="#2E2440">
      <animate attributeName="fill" values="#2E2440;#2E2440;#FFD9C7;#2E2440" keyTimes="0;0.88;0.94;1" dur="3.6s" repeatCount="indefinite" calcMode="discrete" />
    </rect>
    <rect x="120" y="60" width="20" height="20" fill="#FFD9C7" />
    <rect x="140" y="60" width="20" height="20" fill="#2E2440" />

    <!-- row4: nose blush -->
    <rect x="0" y="80" width="20" height="20" fill="#2E2440" />
    <rect x="20" y="80" width="40" height="20" fill="#FFD9C7" />
    <rect x="60" y="80" width="40" height="20" fill="#E24E7A" />
    <rect x="100" y="80" width="40" height="20" fill="#FFD9C7" />
    <rect x="140" y="80" width="20" height="20" fill="#2E2440" />

    <!-- row5: cheeks -->
    <rect x="0" y="100" width="20" height="20" fill="#2E2440" />
    <rect x="20" y="100" width="120" height="20" fill="#FFD9C7" />
    <rect x="140" y="100" width="20" height="20" fill="#2E2440" />

    <!-- row6: chin taper -->
    <rect x="20" y="120" width="20" height="20" fill="#2E2440" />
    <rect x="40" y="120" width="80" height="20" fill="#FFD9C7" />
    <rect x="120" y="120" width="20" height="20" fill="#2E2440" />

    <!-- row7: bottom outline -->
    <rect x="40" y="140" width="80" height="20" fill="#2E2440" />
  </g>
</svg>
